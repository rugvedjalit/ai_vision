###############################################
# MediaMTX Configuration — AI Vision System
###############################################

# Global settings
logLevel: info
logDestinations: [stdout]

# RTSP server — receives H.264 streams from DeepStream
rtsp: true
rtspAddress: :8554
rtspTransports: [udp, multicast, tcp]
rtspRangeType: clock

# RTMP — disabled (not needed)
rtmp: false

# HLS — disabled (using WebRTC instead)
hls: false

# WebRTC server — serves streams to browser frontend
webrtc: true
webrtcAddress: :8889
webrtcEncryption: "no"
webrtcICEServers2: []
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []

# SRT — disabled
srt: false

# API
api: true
apiAddress: :9997

# Output buffer queue size (per-stream write queue depth)
writeQueueSize: 512

# Path configuration — auto-accept any stream name
paths:
  all_others:
